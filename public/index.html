<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Shorts Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .subscribe {
      background: #22c55e;
      color: black;
    }

    .output {
      margin-top: 20px;
      white-space: pre-wrap;
      font-size: 15px;
      line-height: 1.5;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Auto Shorts Generator</h1>

    <input
      id="topicInput"
      type="text"
      placeholder="e.g. killer facts"
    />

    <button class="primary" onclick="generateCaptions()">
      Generate Captions
    </button>

    <button class="subscribe">
      Subscribe (€19.99 / month)
    </button>

    <div id="output" class="output"></div>
    <div id="error" class="error"></div>
  </div>

  <script>
    async function generateCaptions() {
      const topic = document.getElementById("topicInput").value;
      const output = document.getElementById("output");
      const error = document.getElementById("error");

      output.innerText = "";
      error.innerText = "";

      if (!topic) {
        error.innerText = "Please enter a topic.";
        return;
      }

      try {
        const res = await fetch("/generate-captions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ topic })
        });

        const data = await res.json();

        // ✅ THIS WAS THE BUG — NOW FIXED
        output.innerText = data.captions;

      } catch (err) {
        error.innerText = "Server error. Check connection.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
