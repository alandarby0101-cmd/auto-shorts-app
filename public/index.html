<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Shorts AI</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding-top: 60px;
    }
    .card {
      background: #020617;
      padding: 24px;
      border-radius: 12px;
      width: 420px;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      background: #020617;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Auto Shorts AI</h2>

    <input id="topic" placeholder="Enter a topic…" />
    <button id="generateBtn">Generate</button>

    <pre id="output">—</pre>
  </div>

  <script>
    const btn = document.getElementById("generateBtn");
    const topicInput = document.getElementById("topic");
    const output = document.getElementById("output");

    btn.addEventListener("click", async () => {
      output.textContent = "Generating…";

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic: topicInput.value })
        });

        const data = await res.json();

        if (data.output) {
          output.textContent = data.output;
        } else {
          output.textContent = "Error generating content";
        }
      } catch (err) {
        output.textContent = "Server error";
      }
    });
  </script>
</body>
</html>
