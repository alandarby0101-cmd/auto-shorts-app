<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Shorts Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      background: #020617;
      padding: 24px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 12px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .generate {
      background: #2563eb;
      color: white;
    }

    .subscribe {
      background: #22c55e;
      color: black;
    }

    .result {
      margin-top: 16px;
      background: #020617;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Auto Shorts Generator</h1>

    <input id="topic" placeholder="Enter a topic (e.g. killer facts)" />

    <button class="generate" onclick="generateCaptions()">
      Generate Captions
    </button>

    <button class="subscribe">
      Subscribe (€19.99 / month)
    </button>

    <div id="output" class="result"></div>
    <div id="error" class="error"></div>
  </div>

  <script>
    async function generateCaptions() {
      const topic = document.getElementById("topic").value.trim();
      const output = document.getElementById("output");
      const error = document.getElementById("error");

      output.textContent = "";
      error.textContent = "";

      if (!topic) {
        error.textContent = "Please enter a topic.";
        return;
      }

      try {
        const res = await fetch("/generate-captions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ topic })
        });

        const data = await res.json();

        if (!res.ok) {
          error.textContent = data.error || "Something went wrong.";
          return;
        }

        output.textContent = data.captions.join("\n\n");
      } catch (err) {
        error.textContent = "Server error. Check connection.";
      }
    }
  </script>
</body>
</html>
