<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Shorts Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0b1020;
      --card: #11162a;
      --primary: #3b82f6;
      --secondary: #22c55e;
      --danger: #ef4444;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #1a2150, #0b1020);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 900px;
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 28px;
    }

    .input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      margin-bottom: 14px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
    }

    .primary { background: var(--primary); color: white; }
    .secondary { background: var(--secondary); color: #052e16; }
    .locked { background: #374151; color: var(--muted); cursor: not-allowed; }

    .usage {
      text-align: center;
      margin: 16px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: #0f172a;
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
    }

    .card h3 {
      margin-top: 0;
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
    }

    .error {
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
    }

    .pro {
      margin-top: 20px;
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, #1e293b, #020617);
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .pro strong {
      color: #a5b4fc;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Auto Shorts Generator</h1>

    <input id="topic" class="input" placeholder="Enter a topic (e.g. killer facts)" />

    <div class="buttons">
      <button class="primary" onclick="generate()">Generate Content</button>
      <button class="secondary" onclick="subscribe()">Upgrade to Pro</button>
    </div>

    <div class="usage" id="usage"></div>

    <div id="error" class="error"></div>

    <div id="result" class="card" style="display:none;">
      <h3>Captions</h3>
      <pre id="captions"></pre>

      <h3>Hook</h3>
      <pre id="hook"></pre>

      <h3>Script</h3>
      <pre id="script"></pre>
    </div>

    <div class="pro">
      <strong>Pro Features</strong><br />
      🎬 Auto video generation<br />
      ✂ Crop to 9:16<br />
      🔊 Voiceover<br />
      ♾ Unlimited usage
    </div>
  </div>

<script>
  const LIMIT = 2;
  const today = new Date().toDateString();

  function getUsage() {
    const data = JSON.parse(localStorage.getItem("usage") || "{}");
    if (data.date !== today) {
      return { date: today, count: 0 };
    }
    return data;
  }

  function setUsage(data) {
    localStorage.setItem("usage", JSON.stringify(data));
  }

  function updateUsageUI() {
    const u = getUsage();
    document.getElementById("usage").innerText =
      `Free usage: ${u.count}/${LIMIT} today`;
  }

  async function generate() {
    const topic = document.getElementById("topic").value.trim();
    const error = document.getElementById("error");
    error.innerText = "";

    if (!topic) {
      error.innerText = "Enter a topic first.";
      return;
    }

    const usage = getUsage();
    if (usage.count >= LIMIT) {
      error.innerText = "Free limit reached. Upgrade to Pro.";
      return;
    }

    try {
      const res = await fetch("/generate-captions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ topic })
      });

      const data = await res.json();

      document.getElementById("result").style.display = "block";
      document.getElementById("captions").innerText = data.captions || "—";
      document.getElementById("hook").innerText = data.hook || "Auto hook here";
      document.getElementById("script").innerText = data.script || "Auto script here";

      usage.count++;
      setUsage(usage);
      updateUsageUI();

    } catch (e) {
      error.innerText = "Server error. Try again.";
    }
  }

  function subscribe() {
    alert("Stripe checkout goes here.");
  }

  updateUsageUI();
</script>

</body>
</html>
