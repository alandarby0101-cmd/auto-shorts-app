<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto Shorts Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(0, 0, 0, 0.4);
      padding: 24px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 16px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .generate {
      background: #3b82f6;
      color: #fff;
    }

    .subscribe {
      background: #22c55e;
      color: #fff;
    }

    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }

    #result {
      margin-top: 12px;
      font-size: 13px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Auto Shorts Generator</h1>

    <input
      id="topicInput"
      type="text"
      placeholder="Enter a topic (e.g. killer facts)"
    />

    <button class="generate" id="generateBtn">
      Generate Captions
    </button>

    <button class="subscribe">
      Subscribe (€19.99 / month)
    </button>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    const generateBtn = document.getElementById("generateBtn");
    const topicInput = document.getElementById("topicInput");
    const statusDiv = document.getElementById("status");
    const resultDiv = document.getElementById("result");

    generateBtn.addEventListener("click", async () => {
      const topic = topicInput.value.trim();

      if (!topic) {
        statusDiv.textContent = "Please enter a topic.";
        return;
      }

      statusDiv.textContent = "Generating captions...";
      resultDiv.textContent = "";

      try {
        const response = await fetch("/generate-captions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ topic })
        });

        const data = await response.json();

        if (!response.ok) {
          statusDiv.textContent = "Server error.";
          console.error(data);
          return;
        }

        statusDiv.textContent = "Done ✅";
        resultDiv.textContent = data.captions;
      } catch (err) {
        statusDiv.textContent = "Network error.";
        console.error(err);
      }
    });
  </script>
</body>
</html>
