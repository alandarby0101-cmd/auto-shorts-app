<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Auto Shorts AI — Pro</title>

<style>
/* ================= RESET ================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ================= BACKGROUND (MATCHES HOMEPAGE) ================= */
body {
  min-height: 100vh;
  color: #fff;
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(120,80,255,.35), transparent 60%),
    radial-gradient(800px 500px at 80% 20%, rgba(57,255,210,.18), transparent 60%),
    linear-gradient(180deg, #120028 0%, #05010d 100%);
  overflow-x: hidden;
}

/* ================= LAYOUT ================= */
.app {
  display: grid;
  grid-template-columns: 300px 1fr 380px;
  gap: 28px;
  padding: 40px;
}

/* ================= GLASS CARD ================= */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.14);
  backdrop-filter: blur(18px);
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 0 45px rgba(130,90,255,0.18);
  transition: .25s ease;
}

.card:hover {
  box-shadow: 0 0 70px rgba(140,120,255,0.4);
  transform: translateY(-2px);
}

/* ================= SIDEBAR ================= */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.avatar {
  width: 82px;
  height: 82px;
  margin: 0 auto 12px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7f5bff, #39ffd2);
  box-shadow: 0 0 30px rgba(120,120,255,.6);
}

.status {
  text-align: center;
  color: #39ffd2;
  font-weight: 600;
  margin-top: 6px;
}

.small {
  font-size: 13px;
  opacity: .75;
  text-align: center;
}

/* ================= CENTER ================= */
.center {
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.tab {
  padding: 8px 14px;
  font-size: 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
}

.tab.active {
  background: linear-gradient(135deg,#7f5bff,#39ffd2);
  color: #000;
  font-weight: 700;
}

.output {
  background: rgba(0,0,0,.35);
  border-radius: 14px;
  padding: 16px;
  min-height: 160px;
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.5;
}

/* ================= RIGHT PANEL ================= */
.video-box {
  height: 260px;
  border-radius: 16px;
  background:
    radial-gradient(circle at top, rgba(120,80,255,.35), transparent 60%),
    linear-gradient(135deg, #1a1340, #2b1460);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  opacity: .9;
  animation: glow 3s ease-in-out infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 40px rgba(120,80,255,.3); }
  to   { box-shadow: 0 0 80px rgba(120,120,255,.55); }
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 700;
  background: linear-gradient(135deg,#7f5bff,#39ffd2);
  color: #000;
}

.feature {
  margin-top: 10px;
  font-size: 13px;
  opacity: .75;
}

/* ================= MOBILE ================= */
@media (max-width: 1100px) {
  .app {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="card">
      <div class="avatar"></div>
      <h3 style="text-align:center;">Alex Summers</h3>
      <div class="status">✔ Pro Status: Active</div>
      <div class="small">alex.summers@email.com</div>
    </div>

    <div class="card">
      <h3>Creator Stats</h3>
      <p class="small">Videos Generated: <span id="count">0</span></p>
      <p class="small">Virality Score: —</p>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="card">
      <h2>Your Shorts Scripts</h2>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('script', this)">Scripts</div>
        <div class="tab" onclick="switchTab('hook', this)">Hooks</div>
        <div class="tab" onclick="switchTab('caption', this)">Captions</div>
      </div>

      <div id="scriptBox" class="output"></div>
      <div id="hookBox" class="output" style="display:none;"></div>
      <div id="captionBox" class="output" style="display:none;"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="card">
    <h2>AI Shorts Video</h2>
    <div class="video-box">AI Shorts Video Generator</div>
    <button class="btn">Create New Video</button>
    <div class="feature">✔ Unlimited Generations</div>
    <div class="feature">✔ Script length up to 300 words</div>
    <div class="feature">✔ HD Video Quality</div>
  </div>

</div>

<script>
/* ===== LOAD FROM HOMEPAGE ===== */
document.getElementById("scriptBox").innerText =
  localStorage.getItem("lastScript") || "Your scripts will appear here.";

document.getElementById("hookBox").innerText =
  localStorage.getItem("lastHook") || "Your hooks will appear here.";

document.getElementById("captionBox").innerText =
  localStorage.getItem("lastCaptions") || "Your captions will appear here.";

/* ===== TABS ===== */
function switchTab(type, el) {
  document.querySelectorAll(".output").forEach(o => o.style.display = "none");
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  if (type === "script") scriptBox.style.display = "block";
  if (type === "hook") hookBox.style.display = "block";
  if (type === "caption") captionBox.style.display = "block";

  el.classList.add("active");
}
</script>

</body>
</html>
